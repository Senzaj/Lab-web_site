<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dating App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

    <aside class="sidebar left">
        <div class="profile-header">
            <h3>Профиль</h3>
            <div class="profile-actions">
                <button id="editBtn">⚙️</button>
                <button id="saveBtn" style="display:none">✔️</button>
            </div>
        </div>

        <input id="userName" placeholder="Имя" disabled>

        <div class="toggle" id="genderToggle">
            <div class="toggle-option active" data-value="M">М</div>
            <div class="toggle-option" data-value="F">Ж</div>
        </div>

        <input id="birth" type="date"  disabled>
        <textarea id="bio" placeholder="Описание" disabled ></textarea>
    </aside>

    <main class="main">

        <div class="tabs">
            <button id="tabSwipe" class="active">Анкеты</button>
            <button id="tabChat">Диалоги</button>
        </div>

        <div id="swipeView" class="view active">
            <div class="card-stack" id="stack"></div>
        </div>

        <div id="chatListView" class="view">
            <div class="chat-list"></div>
        </div>

    </main>

    <aside class="sidebar right" id="chatPanel">
        <div class="chat-header" id="chatHeader"></div>
        <div id="chatWindow"></div>
        <div class="chat-input">
            <input id="messageInput">
            <button id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
    </aside>

</div>
<script src="js/app.js"></script>
<script src="js/profilesList.js"></script>
<script src="js/userProfile.js"></script>
<script src="js/chat.js"></script>
<script src="js/swipe.js"></script>
</body>
</html>
